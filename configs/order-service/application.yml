# Common (profile-agnostic) configuration for order-service, served by config-server.
server:
  port: 0

spring:
  # OAuth2 Resource Server: Keycloak realm'i üzerinden gelen JWT'leri doğrular.
  # issuer-uri'den JWK (public key) uçları otomatik keşfedilir.
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/etiya-project}
  # MySQL database backing the orders, Outbox, Inbox and local customer replica tables.
  # (Container: infra/podman-compose.yml -> etiya-mysql, host port 3307 -> container 3306)
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3307/orderdb}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:etiya}
    password: ${MYSQL_PASSWORD:etiya}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  # Redis-backed cache for order reads/writes (see OrderManager and CacheConfig).
  # (Container: infra/podman-compose.yml -> etiya-redis, port 6379)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false
  cloud:
    # Consumer function reading customer lifecycle events (order-service also produces via StreamBridge).
    function:
      definition: customerEvents
    stream:
      bindings:
        # Producer: the outbox relay sends OrderCreated payloads here -> Kafka topic "order-created"
        orderCreated-out-0:
          destination: order-created
        # Consumer: "customerEvents" applies each event to the local customer replica (Inbox pattern).
        customerEvents-in-0:
          destination: customer-events
          group: order-service

# Transactional Outbox polling publisher (Spring @Scheduled).
outbox:
  poller:
    fixed-delay: 15000   # ms between polls
    batch-size: 100      # max events published per poll
    max-retry: 5         # relay attempts before an event is marked FAILED

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    instance-id: ${spring.application.name}:${random.uuid}
    prefer-ip-address: true
