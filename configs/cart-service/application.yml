# Common (profile-agnostic) configuration for cart-service, served by config-server.
server:
  port: 0

spring:
  # MySQL database backing the Cart aggregate, the Outbox and the Inbox tables.
  # (Container: infra/podman-compose.yml -> etiya-mysql, host port 3307 -> container 3306;
  #  cartdb is created by the one-shot mysql-db-init container.)
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3307/cartdb}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:etiya}
    password: ${MYSQL_PASSWORD:etiya}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  # Redis-backed cache for the active cart reads/writes (see CartManager and CacheConfig).
  # (Container: infra/podman-compose.yml -> etiya-redis, port 6379)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false
  cloud:
    # Consumer function reading customer lifecycle events (cart-service also produces via StreamBridge).
    function:
      definition: customerEvents
    stream:
      bindings:
        # Consumer: "customerEvents" -> local customer replica (Inbox pattern) to validate customerId.
        customerEvents-in-0:
          destination: customer-events
          group: cart-service
        # Producer: the outbox relay sends CartCheckedOut payloads -> Kafka topic "cart-checked-out"
        cartCheckedOut-out-0:
          destination: cart-checked-out

# Transactional Outbox polling publisher (Spring @Scheduled).
outbox:
  poller:
    fixed-delay: 15000
    batch-size: 100
    max-retry: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    instance-id: ${spring.application.name}:${random.uuid}
    prefer-ip-address: true
