# Common (profile-agnostic) configuration for customer-service, served by config-server.
server:
  port: 0

spring:
  # PostgreSQL database backing the Customer table and the Transactional Outbox table.
  # (Container: infra/podman-compose.yml -> etiya-postgres, host port 5433 -> container 5432;
  #  customerdb is created by the one-shot customer-db-init container.)
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5433/customerdb}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  # Redis-backed cache for customer reads/writes (see CustomerManager and CacheConfig).
  # (Container: infra/podman-compose.yml -> etiya-redis, port 6379)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false
  cloud:
    stream:
      bindings:
        # Producer: the outbox relay sends customer lifecycle events -> Kafka topic "customer-events"
        customerEvents-out-0:
          destination: customer-events

# Transactional Outbox polling publisher (Spring @Scheduled).
outbox:
  poller:
    fixed-delay: 15000
    batch-size: 100
    max-retry: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    instance-id: ${spring.application.name}:${random.uuid}
    prefer-ip-address: true
