# Common (profile-agnostic) configuration for notification-service, served by config-server.
server:
  port: 0

spring:
  # PostgreSQL database backing the notification log and the Inbox (idempotency) table.
  # (Container: infra/podman-compose.yml -> etiya-postgres, host port 5433 -> container 5432;
  #  notificationdb is created by the one-shot notification-db-init container.)
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5433/notificationdb}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  # Redis-backed cache for the notification log reads (see NotificationsController and CacheConfig).
  # (Container: infra/podman-compose.yml -> etiya-redis, port 6379)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false
  cloud:
    # Three independent consumers, one per source topic.
    function:
      definition: orderCreated;customerEvents;cartCheckedOut
    stream:
      bindings:
        orderCreated-in-0:
          destination: order-created
          group: notification-service
        customerEvents-in-0:
          destination: customer-events
          group: notification-service
        cartCheckedOut-in-0:
          destination: cart-checked-out
          group: notification-service

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    instance-id: ${spring.application.name}:${random.uuid}
    prefer-ip-address: true
