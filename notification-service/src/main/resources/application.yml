server:
  port: 0

spring:
  application:
    name: notification-service

  # H2 in-memory database backing the sent-notification log and the Inbox (idempotency) table.
  datasource:
    url: jdbc:h2:mem:notificationdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true       # UI: http://<host>:<port>/h2-console  (JDBC URL: jdbc:h2:mem:notificationdb, user: sa)
      path: /h2-console
      settings:
        web-allow-others: true
  cloud:
    # Three independent consumers, one per source topic.
    function:
      definition: orderCreated;customerEvents;cartCheckedOut
    stream:
      kafka:
        binder:
          brokers: localhost:9092
      bindings:
        # Consumer: order lifecycle -> "order placed" notification
        orderCreated-in-0:
          destination: order-created
          group: notification-service
        # Consumer: customer lifecycle -> "welcome" notification
        customerEvents-in-0:
          destination: customer-events
          group: notification-service
        # Consumer: cart checkout -> "checkout" notification
        cartCheckedOut-in-0:
          destination: cart-checked-out
          group: notification-service

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true # kendini ayağa kalktığın an eurekaya tanıt
    fetch-registry: true # istenildiğinde diğer servislerin bilgisini çek
  instance:
    instance-id: ${spring.application.name}:${random.uuid}
    prefer-ip-address: true
