# Etiya11 Microservices - Altyapı (Infrastructure) Compose Dosyası
#
# Çalıştırmak için:
#   cd infra
#   podman compose -f podman-compose.yml up -d
#
# Durdurmak için:
#   podman compose -f podman-compose.yml down
#
# Volume'lerle birlikte tamamen silmek için:
#   podman compose -f podman-compose.yml down -v

version: "3.8"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL veritabanı (product-service -> productdb,
  # notification-service -> notificationdb, customer-service -> customerdb,
  # keycloak -> keycloakdb)
  # ---------------------------------------------------------------------------
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: etiya-postgres
    restart: unless-stopped
    # Outbox/CDC (Debezium) logical replication slot'ları için wal_level=logical gerekli.
    # Aksi halde "order_outbox_slot exists, but wal_level < logical" hatasıyla açılmaz.
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: productdb
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d productdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # notification-service için veritabanını oluşturan tek seferlik init container
  # (postgres imajı sadece POSTGRES_DB'de tanımlı tek DB'yi otomatik oluşturur)
  # ---------------------------------------------------------------------------
  notification-db-init:
    image: docker.io/library/postgres:16-alpine
    container_name: etiya-notification-db-init
    restart: "no"
    environment:
      PGPASSWORD: postgres
    entrypoint: >
      sh -c "psql -h postgres -U postgres -tc \"SELECT 1 FROM pg_database WHERE datname='notificationdb'\" | grep -q 1
      || psql -h postgres -U postgres -c 'CREATE DATABASE notificationdb'"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # customer-service için veritabanını oluşturan tek seferlik init container
  # (postgres imajı sadece POSTGRES_DB'de tanımlı tek DB'yi otomatik oluşturur)
  # ---------------------------------------------------------------------------
  customer-db-init:
    image: docker.io/library/postgres:16-alpine
    container_name: etiya-customer-db-init
    restart: "no"
    environment:
      PGPASSWORD: postgres
    entrypoint: >
      sh -c "psql -h postgres -U postgres -tc \"SELECT 1 FROM pg_database WHERE datname='customerdb'\" | grep -q 1
      || psql -h postgres -U postgres -c 'CREATE DATABASE customerdb'"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # MySQL veritabanı (order-service -> orderdb, cart-service -> cartdb)
  # ---------------------------------------------------------------------------
  mysql:
    image: docker.io/library/mysql:8.4
    container_name: etiya-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orderdb
      MYSQL_USER: etiya
      MYSQL_PASSWORD: etiya
    ports:
      # Host'ta çalışan olası bir lokal MySQL (3306) ile çakışmamak için 3307'ye maplendi
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uetiya", "-petiya"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # cart-service için veritabanını oluşturan tek seferlik init container
  # (mysql imajı sadece MYSQL_DATABASE'de tanımlı tek DB'yi otomatik oluşturur)
  # ---------------------------------------------------------------------------
  mysql-db-init:
    image: docker.io/library/mysql:8.4
    container_name: etiya-mysql-db-init
    restart: "no"
    environment:
      MYSQL_PWD: root
    entrypoint: >
      sh -c "mysql -h mysql -uroot -e
      'CREATE DATABASE IF NOT EXISTS cartdb;
      GRANT ALL PRIVILEGES ON cartdb.* TO \"etiya\"@\"%\";
      FLUSH PRIVILEGES;'"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # Redis (tüm servislerin ortak okuma/yazma cache katmanı)
  # ---------------------------------------------------------------------------
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: etiya-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # Apache Kafka (KRaft modu - Zookeeper'a ihtiyaç duymaz)
  # ---------------------------------------------------------------------------
  kafka:
    image: docker.io/apache/kafka:3.7.0
    container_name: etiya-kafka
    restart: unless-stopped
    ports:
      # Host (uygulamalar) için dış erişim portu
      - "9092:9092"
    environment:
      # --- KRaft (broker + controller aynı node) ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # --- Listener tanımları ---
      # PLAINTEXT: container ağı içinden erişim (kafka:29092)
      # PLAINTEXT_HOST: host makineden erişim (localhost:9092)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # --- Tek node için replikasyon ayarları ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      # --- Veri ve cluster ayarları ---
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: etiya-kafka-cluster-001
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # Keycloak (Kimlik ve Erişim Yönetimi - OAuth2 / OpenID Connect)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: etiya-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      # Admin konsolu giriş bilgileri (http://localhost:8180)
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

      # --- Veritabanı (mevcut PostgreSQL container'ı kullanılır) ---
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloakdb
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres

      # Dev ortamı için HTTP yeterli
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"

      # Healthcheck endpoint'lerini aç (9000 portundan servis edilir)
      KC_HEALTH_ENABLED: "true"
    ports:
      # 8080 mikroservisler tarafından kullanıldığı için host'ta 8180'e maplendi
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - etiya-net

  # ---------------------------------------------------------------------------
  # Keycloak için veritabanını oluşturan tek seferlik init container
  # (postgres imajı sadece POSTGRES_DB'de tanımlı tek DB'yi otomatik oluşturur)
  # ---------------------------------------------------------------------------
  keycloak-db-init:
    image: docker.io/library/postgres:16-alpine
    container_name: etiya-keycloak-db-init
    restart: "no"
    environment:
      PGPASSWORD: postgres
    entrypoint: >
      sh -c "psql -h postgres -U postgres -tc \"SELECT 1 FROM pg_database WHERE datname='keycloakdb'\" | grep -q 1
      || psql -h postgres -U postgres -c 'CREATE DATABASE keycloakdb'"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - etiya-net

volumes:
  postgres-data:
  mysql-data:
  redis-data:
  kafka-data:

networks:
  etiya-net:
    driver: bridge
